<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Helper</title>
    <link rel="stylesheet" href="src/homepage.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="images/owl_icon.ico" />
    <script src="src/quiz.js" type="module"></script>
  </head>
  <body style="position: relative; flex-direction: column; gap: 30px">
    <div
      id="quiz-container"
      style="
        background: rgba(240, 238, 180, 0.95);
        padding: 40px;
        border-radius: 20px;
        border: 4px solid #3d3d3d;
        text-align: center;
        max-width: 600px;
        width: 100%;
      "
    >
      <div
        id="progress"
        style="font-size: 20px; margin-bottom: 20px; color: #666"
      >
        Вопрос 0 из 0
      </div>
      <h1
        id="question-word"
        style="
          font-family: &quot;Playfair Display&quot;, serif;
          font-size: 48px;
          margin-bottom: 40px;
        "
      >
        Word
      </h1>

      <!-- Сетка для 4 кнопок вариантов -->
      <div
        id="choices-container"
        style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px"
      >
        <!-- Сюда JS вставит кнопки -->
      </div>
    </div>

    <!-- Экран результатов (изначально скрыт) -->
    <div
      id="result-container"
      style="
        display: none;
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 20px;
        border: 4px solid #3d3d3d;
        text-align: center;
      "
    >
      <h2 style="font-size: 36px; margin-bottom: 20px">Викторина завершена!</h2>
      <p id="score-text" style="font-size: 28px; margin-bottom: 30px"></p>
      <button
        onclick="window.location.href = '/homepage.html'"
        style="
          font-size: 24px;
          padding: 10px 20px;
          border-radius: 10px;
          cursor: pointer;
        "
      >
        Вернуться на главную
      </button>
    </div>
  </body>
</html>
