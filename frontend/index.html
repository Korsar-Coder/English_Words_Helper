    <form class="login-form" action="" method="post">
      <!-- <label for="user-name">Введите имя</label> -->
      <h1 id="head" class="stroke-text">Авторизация</h1>
      <input
        type="text"
        minlength="5"
        maxlength="15"
        placeholder="Ваш ник"
        id="user-name"
        class="big-input"
      />
      <br />
      <!-- <label for="user-password">Введите пароль</label> -->
      <input
        type="password"
        minlength="5"
        maxlength="20"
        placeholder="Пароль"
        id="user-password"
        class="big-input"
      />
      <br />
      <input
        type="submit"
        value="Proceed"
        id="submit-button"
        class="stroke-text"
      />
    </form>
  </body>
