<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/auth-register.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="images/owl_icon.ico" />
    <script src="src/register.js" type="module"></script>
    <title>English Helper</title>
  </head>
  <body>
    <form id="register-form" class="login-form" method="post">
      <h1 id="head" class="stroke-text">Регистрация</h1>
      <input
        type="text"
        minlength="5"
        maxlength="15"
        placeholder="Ваш ник"
        id="user-name"
        class="big-input"
        name="username"
        required
      />
      <input
        type="password"
        minlength="5"
        maxlength="20"
        placeholder="Пароль"
        id="user-password"
        class="big-input"
        name="password"
        required
      />
      <input
        type="password"
        minlength="5"
        maxlength="20"
        placeholder="Повторите пароль"
        id="user-password-repeat"
        class="big-input password_repeat"
        required
      />
    </form>
  </body>
</html>
