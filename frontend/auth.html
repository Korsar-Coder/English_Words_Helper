<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Helper</title>
    <link rel="stylesheet" href="src/auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="images/owl_icon.ico" />
    <script src="src/auth.js" type="module"></script>
  </head>
  <body class="bg-light">
    <form class="login-form" action="/login" method="post">
      <!-- <label for="user-name">Введите имя</label> -->
      <h1 id="head" class="stroke-text">Авторизация</h1>
      <input
        type="text"
        minlength="5"
        maxlength="15"
        placeholder="Ваш ник"
        id="user-name"
        class="big-input"
        name="username"
        required
      />
      <!-- <label for="user-password">Введите пароль</label> -->
      <input
        type="password"
        minlength="5"
        maxlength="20"
        placeholder="Пароль"
        id="user-password"
        class="big-input"
        name="password"
        required
      />
      <input type="submit" value="Proceed" id="submit-button" />
    </form>
  </body>
</html>
